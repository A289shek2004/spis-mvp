<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPIS - Product Detail</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 0; }
    header { background: #ddd; padding: 10px 20px; font-weight: bold; }
    .container { padding: 20px; }
    .actions { margin-bottom: 10px; }
    button { padding: 8px 12px; margin-right: 10px; border: 1px solid #ccc; background: #eee; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #aaa; padding: 8px; }
    th { background: #e0e0e0; }
    .alert { background: #fff3cd; border: 1px solid #ffeeba; padding: 10px; margin-top: 10px; }
  </style>
</head>
<body>
  <header>Product: Paracetamol</header>
  <div class="container">
    <div class="actions">
      <button>Add New Batch</button>
      <button>FEFO Picklist</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Batch No</th>
          <th>Expiry Date</th>
          <th>Qty</th>
          <th>Purchase Price</th>
          <th>Supplier</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>B1234</td>
          <td>2025-03-01</td>
          <td>30</td>
          <td>₹25.00</td>
          <td>Supplier1</td>
        </tr>
      </tbody>
    </table>

    <div class="alert">⚠️ Batch 1234 expires in 10 days!</div>
  </div>
</body>
</html>
