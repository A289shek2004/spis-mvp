<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPIS - PO Suggestion</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
    header { background: #ddd; padding: 10px 20px; font-weight: bold; margin: -20px -20px 20px -20px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #aaa; padding: 8px; }
    th { background: #e0e0e0; }
    button { margin-top: 20px; padding: 10px 20px; background: #eee; border: 1px solid #ccc; cursor: pointer; }
    .alert { margin-top: 20px; background: #fff3cd; border: 1px solid #ffeeba; padding: 10px; }
  </style>
</head>
<body>
  <header>Purchase Order Suggestions</header>

  <table>
    <tr><th>Product</th><th>Avg Daily Demand</th><th>Current Stock</th><th>Suggested Reorder Qty</th></tr>
    <tr><td>Amoxicillin</td><td>5</td><td>40</td><td>60</td></tr>
    <tr><td>Vitamin C</td><td>3</td><td>20</td><td>40</td></tr>
  </table>

  <button>Generate Purchase Order PDF</button>

  <div class="alert">⚠️ These products are projected to run out within 15 days.</div>
</body>
</html>
