<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPIS - Login (Wireframe)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #333;
    }
    .container {
      background: #fff;
      border: 2px dashed #aaa;
      border-radius: 8px;
      padding: 40px 60px;
      width: 360px;
      text-align: center;
    }
    h1 {
      margin-bottom: 20px;
      font-size: 20px;
    }
    .input {
      display: block;
      width: 100%;
      margin-bottom: 15px;
      padding: 10px;
      border: 1px solid #ccc;
    }
    .btn {
      background: #ddd;
      border: none;
      padding: 10px 20px;
      width: 100%;
      cursor: pointer;
      border-radius: 4px;
    }
    .btn:hover {
      background: #ccc;
    }
    .forgot {
      margin-top: 10px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Smart Pharma Inventory System</h1>
    <input class="input" type="text" placeholder="Username">
    <input class="input" type="password" placeholder="Password">
    <button class="btn">Login</button>
    <div class="forgot">Forgot password?</div>
  </div>
</body>
</html>
