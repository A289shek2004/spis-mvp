<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPIS - Inventory List</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
    }
    header {
      background: #ddd;
      padding: 10px 20px;
      font-weight: bold;
    }
    .container {
      padding: 20px;
    }
    .actions {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
    }
    button, select {
      padding: 8px 12px;
      border: 1px solid #ccc;
      background: #eee;
      cursor: pointer;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      border: 1px solid #aaa;
      padding: 8px;
      text-align: left;
    }
    th {
      background: #e0e0e0;
    }
    .empty {
      text-align: center;
      padding: 20px;
      color: #666;
    }
  </style>
</head>
<body>
  <header>Inventory</header>
  <div class="container">
    <div class="actions">
      <select>
        <option>Filter by category</option>
      </select>
      <button>+ Add Product</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Product</th>
          <th>Batch</th>
          <th>Qty</th>
          <th>Expiry</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Paracetamol</td>
          <td>B1234</td>
          <td>45</td>
          <td>2025-08-01</td>
          <td><button>View</button></td>
        </tr>
        <tr>
          <td colspan="5" class="empty">No more products — add your first inventory item!</td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
