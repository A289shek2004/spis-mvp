version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: spis
      POSTGRES_USER: spis
      POSTGRES_PASSWORD: spispass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    build: ./backend
    command: gunicorn backend.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - ./backend/.env

volumes:
  postgres_data:
